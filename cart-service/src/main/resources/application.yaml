server:
  port: 8082

spring:
  application:
    name: cart-service
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/cart_service
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}

  flyway:
    enabled: true
    locations: classpath:db/migration

product:
  service:
    base-url: ${PRODUCT_SERVICE_BASE_URL:http://localhost:8081/product}

