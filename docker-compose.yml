services:
  postgres-db:
    image: postgres:17

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: product_service

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      retries: 5
      interval: 10s
      timeout: 5s
      start_period: 10s
      start_interval: 10s
    ports:
      - "5432:5432"

  kafka-service:
    image: apache/kafka
    container_name: kafka
    ports:
      - "9092:9092"

  redis-service:
    image: redis
    ports:
      - "6379:6379"


  product-service:
    build: ./product-service
    environment:
      DB_HOST: postgres-d
    ports:
      - "8081:8081"
    depends_on:
      postgres-db:
          condition: service_healthy
    container_name: product-service1

volumes:
  postgres-data:
