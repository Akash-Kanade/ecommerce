server:
  port:8082

spring:
  application:
    name: cart-service
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: validate

  datasource:
    url: jdbc:postgresql://localhost:5432/cart_service
    username: postgres
    password: postgres

  flyway:
    enabled: true
    locations: classpath:db/migration

PRODUCT_SERVICE_BASE_URL: http://localhost:8080/product

